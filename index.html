<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 Days To 21 ❤️</title>

<style>
body{
    margin:0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
                url("ourphoto.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color:white;
    text-align:center;
    padding:20px;
}

h1{
    font-size:30px;
    margin-top:20px;
}

.countdown{
    font-size:38px;
    margin:20px 0;
    font-weight:bold;
}

.section{
    background: rgba(255,255,255,0.15);
    padding:20px;
    border-radius:20px;
    margin:20px auto;
    width:90%;
    max-width:600px;
}

textarea{
    width:95%;
    height:200px;
    border-radius:15px;
    padding:15px;
    border:none;
    font-size:14px;
    margin-top:15px;
}

button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    font-size:18px;
    background:white;
    color:#ff4fa3;
    cursor:pointer;
    font-weight:bold;
}

.result{
    margin-top:20px;
    font-size:16px;
}
</style>
</head>

<body>

<h1 id="typing"></h1>

<div class="countdown" id="countdown"></div>

<div class="section">
<h2>💌 Love Letter - 2 Days To Go</h2>
<p id="loveLetter"></p>
</div>

<div class="section">
<h2>💫 21 Before 22</h2>
<p>Write 21 things you want to have, experience, feel, or achieve before turning 22 ❤️</p>

<textarea id="wishList" placeholder="Write each wish on a new line..."></textarea>

<br>
<button onclick="pickFive()">Choose My 5 💕</button>

<div class="result" id="result"></div>
</div>

<script>

// Typing Effect Header
const headerText = "2 Days Until You Turn 21 My Pink Heart 💖";
let h = 0;
function typeHeader(){
    if(h < headerText.length){
        document.getElementById("typing").innerHTML += headerText.charAt(h);
        h++;
        setTimeout(typeHeader, 60);
    }
}
typeHeader();


// Countdown
const birthday = new Date("March 6, 2026 00:00:00").getTime();
setInterval(function(){
    const now = new Date().getTime();
    const distance = birthday - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        days + " Days " + hours + " Hours " + minutes + " Minutes " + seconds + " Seconds";
},1000);


// Love Letter Typing Effect
const letterText = "My Love ❤️\n\nOnly 2 days left until you turn 21. I wish I could hold your hand at midnight and watch your face light up. Even though we are 1,867km apart, nothing feels distant about my love for you.\n\nI am so proud of the woman you are becoming. 21 looks powerful on you already. I can't wait to celebrate you properly, spoil you, and make memories that will make 21 unforgettable.\n\nTwo more sleeps… and my queen enters her new era 👑💕";
let l = 0;
function typeLetter(){
    if(l < letterText.length){
        document.getElementById("loveLetter").innerHTML += letterText.charAt(l);
        l++;
        setTimeout(typeLetter, 25);
    }
}
typeLetter();


// Random 5 Picker
function pickFive(){
    let wishes = document.getElementById("wishList").value.split("\n").filter(w => w.trim() !== "");
    
    if(wishes.length < 5){
        alert("You need at least 5 wishes 😌");
        return;
    }

    let shuffled = wishes.sort(() => 0.5 - Math.random());
    let selected = shuffled.slice(0,5);

    let output = "<h3>Your 5 Selected 💖</h3>";
    selected.forEach((wish,index)=>{
        output += (index+1) + ". " + wish + "<br>";
    });

    output += "<br><br>📸 Screenshot this and send it to him 😉";
    output += "<br>He officially promises to fulfill these before you turn 22 💍";

    document.getElementById("result").innerHTML = output;
}

</script>

</body>
</html>
