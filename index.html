<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyPinkHeart 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
text-align:center;
color:white;
background:linear-gradient(135deg,#ff69b4,#ff1493);
padding:30px 0;
overflow-x:hidden;
}

.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;
max-width:600px;
width:95%;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

h1{
font-family:'Great Vibes',cursive;
font-size:38px;
margin-bottom:10px;
}

h2{font-weight:300;margin-bottom:20px;font-size:18px;}

.countdown{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:space-between;
}

.time-box{
flex:1 1 70px;
background:rgba(255,255,255,0.25);
padding:12px;
border-radius:15px;
}

.time-box span{display:block;font-size:22px;font-weight:bold;}

button{
margin-top:12px;
padding:12px;
border:none;
border-radius:25px;
background:#ffffff;
color:#ff1493;
cursor:pointer;
font-weight:bold;
width:100%;
transition:0.3s;
}

button:hover{transform:scale(1.05);}

.section{
margin-top:20px;
padding:15px;
background:rgba(255,255,255,0.2);
border-radius:20px;
}

.hidden-heart{
position:fixed;
bottom:10px;
right:10px;
font-size:20px;
cursor:pointer;
opacity:0.4;
}

.heart{
position:absolute;
font-size:18px;
animation:float 6s infinite ease-in;
opacity:0.6;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

.confetti{
position:fixed;
width:8px;
height:14px;
top:0;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(100vh) rotate(720deg);opacity:0;}
}
</style>
</head>
<body>

<div class="container">
<h1>MyPinkHeart 💖</h1>
<h2>Countdown to Your 21st Birthday 🎂</h2>

<div class="countdown">
<div class="time-box"><span id="days">0</span><small>Days</small></div>
<div class="time-box"><span id="hours">0</span><small>Hours</small></div>
<div class="time-box"><span id="minutes">0</span><small>Minutes</small></div>
<div class="time-box"><span id="seconds">0</span><small>Seconds</small></div>
</div>

<div class="section">
<h3>Day <span id="loveDays"></span> of Loving You 💕</h3>
</div>

<div class="section">
<button onclick="whyILoveYou()">Why I Love You 💌</button>
<p id="loveReason"></p>
</div>

<div class="section">
<button onclick="futureDream()">Our Future Together 💍</button>
<p id="futureText"></p>
</div>

<div class="section">
<button onclick="virtualHug()">I Need a Hug 🤗</button>
<p id="hugText"></p>
</div>

</div>

<div class="hidden-heart" onclick="secretTap()">💖</div>

<script>

// COUNTDOWN
const birthday=new Date("March 6, 2026 00:00:00").getTime();
setInterval(()=>{
const now=new Date().getTime();
const distance=birthday-now;
document.getElementById("days").innerText=Math.floor(distance/(1000*60*60*24));
document.getElementById("hours").innerText=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
document.getElementById("minutes").innerText=Math.floor((distance%(1000*60*60))/(1000*60));
document.getElementById("seconds").innerText=Math.floor((distance%(1000*60))/1000);
},1000);

// LOVE DAY COUNTER (CHANGE DATE BELOW)
const relationshipStart=new Date("June 1, 2023");
const today=new Date();
const diff=Math.floor((today-relationshipStart)/(1000*60*60*24));
document.getElementById("loveDays").innerText=diff;

// WHY I LOVE YOU
const reasons=[
"I love how your smile changes my whole day.",
"I love how safe I feel when I'm with you.",
"I love how strong and ambitious you are.",
"I love how your laugh is my favorite sound.",
"I love how you make ordinary days magical."
];

function whyILoveYou(){
document.getElementById("loveReason").innerText=
reasons[Math.floor(Math.random()*reasons.length)];
}

// FUTURE DREAM
const dreams=[
"Traveling the world together ✈️",
"Building our peaceful home 🏡",
"Supporting each other’s dreams 🎓",
"Growing old still holding hands 🤍"
];
let dreamIndex=0;
function futureDream(){
document.getElementById("futureText").innerText=dreams[dreamIndex];
dreamIndex=(dreamIndex+1)%dreams.length;
}

// VIRTUAL HUG
function virtualHug(){
document.getElementById("hugText").innerText=
"Come here… this hug is yours 🤍";
launchConfetti();
}

// SECRET HEART
let tapCount=0;
function secretTap(){
tapCount++;
if(tapCount===5){
alert("You found the hidden part of my heart… it belongs to you 💕");
tapCount=0;
}
}

// CONFETTI
function launchConfetti(){
const colors=["#ffffff","#ffd1f0","#ff69b4","#ff1493"];
for(let i=0;i<120;i++){
let confetti=document.createElement("div");
confetti.classList.add("confetti");
confetti.style.left=Math.random()*100+"vw";
confetti.style.backgroundColor=
colors[Math.floor(Math.random()*colors.length)];
confetti.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(confetti);
setTimeout(()=>{confetti.remove();},5000);
}
}

// FLOATING HEARTS
function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*20+10+"px";
heart.style.animationDuration=Math.random()*3+3+"s";
document.body.appendChild(heart);
setTimeout(()=>{heart.remove();},6000);
}
setInterval(createHeart,800);

</script>

</body>
</html>
