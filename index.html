<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyPinkHeart Countdown 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
text-align:center;
color:white;
background:url("https://images.unsplash.com/photo-1502780402662-acc01917a918") no-repeat center center/cover;
padding:20px 0;
overflow-x:hidden;
}

.overlay{
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:linear-gradient(135deg, rgba(255,105,180,0.85), rgba(255,20,147,0.85));
z-index:0;
}

.container{
position:relative;
z-index:1;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:25px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
max-width:600px;
width:95%;
margin-top:40px;
}

h1{font-family:'Great Vibes',cursive;font-size:38px;}
h2{font-weight:300;margin-bottom:20px;font-size:18px;}

.countdown{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

.time-box{
flex:1 1 70px;
background:rgba(255,255,255,0.25);
padding:12px;
border-radius:15px;
}

.time-box span{display:block;font-size:24px;font-weight:bold;}

.message{margin-top:20px;font-size:14px;line-height:1.6;}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:25px;
background:#ff69b4;
color:white;
cursor:pointer;
font-weight:bold;
width:100%;
transition:0.3s;
}

button:hover{background:#ff1493;}

.photo{
margin-top:20px;
width:100%;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.popup{
position:fixed; top:50%; left:50%;
transform:translate(-50%,-50%) scale(0);
background:white; color:#ff1493;
padding:25px;
border-radius:20px;
width:90%; max-width:400px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
transition:0.4s ease;
z-index:10;
max-height:80vh; overflow-y:auto;
}

.popup.active{transform:translate(-50%,-50%) scale(1);}

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 6s infinite ease-in;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

.firework{
position:absolute;
width:5px;
height:5px;
background:white;
border-radius:50%;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
to{
transform:translate(var(--x), var(--y));
opacity:0;
}
}

.cursor{
display:inline-block;
width:2px;
background:#ff1493;
animation:blink 1s infinite;
margin-left:3px;
}

@keyframes blink{0%,50%,100%{opacity:1;}25%,75%{opacity:0;}}

@media(max-width:400px){h1{font-size:30px;} .time-box span{font-size:20px;}}
</style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
<h1>MyPinkHeart 💖</h1>
<h2>Countdown to Your 21st Birthday 🎂</h2>

<div class="countdown">
<div class="time-box"><span id="days">0</span><small>Days</small></div>
<div class="time-box"><span id="hours">0</span><small>Hours</small></div>
<div class="time-box"><span id="minutes">0</span><small>Minutes</small></div>
<div class="time-box"><span id="seconds">0</span><small>Seconds</small></div>
</div>

<div class="message">
6 days to go! I’m already planning how to spoil you silly, Tiisetso 💕
</div>

<img src="ourphoto.jpg" class="photo" alt="Our Love">

<button onclick="openLetter()">Open a Naughty Little Note 💌</button>
<button onclick="showQuestion()">A Teasing Question 😏</button>
</div>

<div class="popup" id="letter">
<h3 style="font-family:'Great Vibes',cursive;font-size:26px;">
A 6-Day Countdown 💖
</h3>
<p id="typingText" style="margin-top:10px; line-height:1.7;"></p>
<span class="cursor"></span>
<button onclick="closeLetter()">Close 💕</button>
</div>

<script>
const birthday=new Date("March 6, 2026 00:00:00").getTime();

setInterval(()=>{
const now=new Date().getTime();
const distance=birthday-now;

document.getElementById("days").innerText=Math.floor(distance/(1000*60*60*24));
document.getElementById("hours").innerText=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
document.getElementById("minutes").innerText=Math.floor((distance%(1000*60*60))/(1000*60));
document.getElementById("seconds").innerText=Math.floor((distance%(1000*60))/1000);
},1000);

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*20+10+"px";
heart.style.animationDuration=Math.random()*3+3+"s";
document.body.appendChild(heart);
setTimeout(()=>{heart.remove();},6000);
}
setInterval(createHeart,800);

function openLetter(){
document.getElementById("letter").classList.add("active");
startTyping();
}

function closeLetter(){
document.getElementById("letter").classList.remove("active");
document.getElementById("typingText").innerHTML="";
}

function showQuestion(){
alert("Hey Tiisetso… in these 6 days before your 21st, do you want me to whisper all the naughty things I’m planning for your birthday? 😏💖");
}

const message = `
Tiisetso Desiree Mnisi 💖

Only 6 days left until you officially turn 21… and I can’t stop thinking about you.

You’re stunning, smart, and dangerously irresistible. 😏

I might be a little naughty thinking of all the ways I’ll make you laugh… and blush… in these next 6 days. 💕  
Your smile drives me wild.  
Your laugh is my favorite song.  

Prepare yourself for kisses, hugs, tickles, and maybe some cheeky surprises. 😘

Countdown is on, my beautiful troublemaker… and I can’t wait to celebrate YOU.
`;

let i = 0;

function startTyping(){
const typingElement = document.getElementById("typingText");
typingElement.innerHTML="";
i = 0;

function type(){
if(i < message.length){
typingElement.innerHTML += message.charAt(i);
i++;
setTimeout(type, 35);
}
}
type();
}

function launchFireworks(){
for(let i=0;i<100;i++){
let fw=document.createElement("div");
fw.classList.add("firework");
fw.style.left="50%";
fw.style.top="50%";
fw.style.setProperty('--x',(Math.random()-0.5)*500+"px");
fw.style.setProperty('--y',(Math.random()-0.5)*500+"px");
document.body.appendChild(fw);
setTimeout(()=>{fw.remove();},1000);
}
}
</script>

</body>
</html>
