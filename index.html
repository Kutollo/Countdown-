<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 Days To 21 ❤️</title>

<style>
body{
    margin:0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
                url("ourphoto.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color:white;
    text-align:center;
    padding:20px;
}

/* Header */
h1{
    font-size:30px;
    margin-top:20px;
}

/* Countdown Frames */
.countdown{
    display:flex;
    justify-content:center;
    gap:15px;
    margin:30px 0;
    flex-wrap:wrap;
}

.time-box{
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:20px;
    min-width:90px;
    border:2px solid white;
}

.time-box span{
    font-size:32px;
    font-weight:bold;
    display:block;
}

.time-box small{
    font-size:14px;
    letter-spacing:1px;
}

/* Sections */
.section{
    background: rgba(255,255,255,0.15);
    padding:20px;
    border-radius:20px;
    margin:20px auto;
    width:90%;
    max-width:650px;
}

textarea{
    width:95%;
    height:200px;
    border-radius:15px;
    padding:15px;
    border:none;
    font-size:14px;
    margin-top:15px;
}

button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    font-size:18px;
    background:white;
    color:#ff4fa3;
    cursor:pointer;
    font-weight:bold;
}

.result{
    margin-top:20px;
    font-size:16px;
}
</style>
</head>

<body>

<h1 id="typing"></h1>

<!-- Countdown Frames -->
<div class="countdown">
    <div class="time-box">
        <span id="days"></span>
        <small>DAYS</small>
    </div>
    <div class="time-box">
        <span id="hours"></span>
        <small>HOURS</small>
    </div>
    <div class="time-box">
        <span id="minutes"></span>
        <small>MINUTES</small>
    </div>
    <div class="time-box">
        <span id="seconds"></span>
        <small>SECONDS</small>
    </div>
</div>

<!-- Love Letter -->
<div class="section">
<h2>💌 2 Days To Your 21st</h2>
<p id="loveLetter"></p>
</div>

<!-- 21 Before 22 -->
<div class="section">
<h2>💫 21 Before 22</h2>
<p>
My love, write down 21 beautiful things your heart desires —  
things you want to have, experience, feel, or achieve before you turn 22 ❤️  
Dream freely. Think boldly. This is your new era speaking.
</p>

<textarea id="wishList" placeholder="Write each wish on a new line..."></textarea>

<br>
<button onclick="pickFive()">Choose My 5 💕</button>

<div class="result" id="result"></div>
</div>

<script>

// Typing Header
const headerText = "2 Days Until You Turn 21 My Queen 👑💖";
let h = 0;
function typeHeader(){
    if(h < headerText.length){
        document.getElementById("typing").innerHTML += headerText.charAt(h);
        h++;
        setTimeout(typeHeader, 60);
    }
}
typeHeader();


// Countdown Logic
const birthday = new Date("March 6, 2026 00:00:00").getTime();
setInterval(function(){
    const now = new Date().getTime();
    const distance = birthday - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;
},1000);


// Love Letter Typing
const letterText = "My beautiful love ❤️\n\nIn just 2 days, you step into 21 — a new chapter, a new glow, a new level of you. I wish I could be there at midnight, holding you close and whispering how proud I am of the woman you are becoming.\n\nEven though 1,867km separates us right now, nothing could ever separate my heart from yours. Your 21st birthday isn’t just about turning a year older… it’s about celebrating your strength, your softness, your dreams, and everything that makes you you.\n\nTwo more days, my love. And your new era begins ✨";
let l = 0;
function typeLetter(){
    if(l < letterText.length){
        document.getElementById("loveLetter").innerHTML += letterText.charAt(l);
        l++;
        setTimeout(typeLetter, 25);
    }
}
typeLetter();


// Random 5 Picker
function pickFive(){
    let wishes = document.getElementById("wishList").value.split("\n").filter(w => w.trim() !== "");
    
    if(wishes.length < 5){
        alert("You need at least 5 wishes 😌");
        return;
    }

    let shuffled = wishes.sort(() => 0.5 - Math.random());
    let selected = shuffled.slice(0,5);

    let output = "<h3>Your 5 Selected 💖</h3>";
    selected.forEach((wish,index)=>{
        output += (index+1) + ". " + wish + "<br>";
    });

    output += "<br><br>📸 Screenshot this and send it to me 😉";
    output += "<br>I officially promise to fulfill these before you turn 22 💍";

    document.getElementById("result").innerHTML = output;
}

</script>

</body>
</html>
