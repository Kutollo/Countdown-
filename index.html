<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyPinkHeart Turns 21 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
min-height:100vh;
background:linear-gradient(135deg,#ff69b4,#ff1493);
display:flex;
justify-content:center;
align-items:flex-start;
overflow-x:hidden;
padding:30px 0;
color:white;
text-align:center;
}

.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:25px;
border-radius:25px;
width:95%;
max-width:600px;
animation:fadeIn 2s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

h1{
font-family:'Great Vibes',cursive;
font-size:40px;
}

.countdown{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

.time-box{
flex:1 1 70px;
background:rgba(255,255,255,0.25);
padding:12px;
border-radius:15px;
}

.time-box span{
display:block;
font-size:24px;
font-weight:bold;
}

.message{
margin-top:20px;
font-size:14px;
min-height:50px;
}

button{
margin-top:12px;
padding:12px;
border:none;
border-radius:25px;
background:white;
color:#ff1493;
font-weight:bold;
cursor:pointer;
width:100%;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
color:#ff1493;
padding:25px;
border-radius:20px;
width:90%;
max-width:350px;
transition:0.4s;
z-index:10;
}

.popup.active{
transform:translate(-50%,-50%) scale(1);
}

.balloon{
position:absolute;
bottom:-100px;
font-size:30px;
animation:float 8s infinite ease-in;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

.confetti{
position:absolute;
width:8px;
height:8px;
background:white;
top:0;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{transform:translateY(100vh);opacity:0;}
}

.music-btn{
position:fixed;
bottom:20px;
right:20px;
background:white;
color:#ff1493;
border-radius:50%;
width:55px;
height:55px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

@media(max-width:400px){
h1{font-size:30px;}
}
</style>
</head>
<body>

<div class="container">
<h1>MyPinkHeart 💖</h1>
<h3>Countdown to 21 🎂</h3>

<div class="countdown">
<div class="time-box"><span id="days">0</span><small>Days</small></div>
<div class="time-box"><span id="hours">0</span><small>Hours</small></div>
<div class="time-box"><span id="minutes">0</span><small>Minutes</small></div>
<div class="time-box"><span id="seconds">0</span><small>Seconds</small></div>
</div>

<div class="message" id="loveMessage">
You are my answered prayer 💕
</div>

<button onclick="nextMessage()">Next Love Note 💌</button>
<button onclick="openProposal()">Will You Stay With Me Forever? 💍</button>
</div>

<div class="popup" id="proposal">
<h3>Tiisetso 💖</h3>
<p>Will you stay with me forever?</p>
<button onclick="sayYes()">YES 😍</button>
<button id="noBtn">NO 🙈</button>
</div>

<div class="music-btn" onclick="toggleMusic()">🎵</div>

<audio id="bgMusic" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<script>
const birthday=new Date("March 6, 2026 00:00:00").getTime();

setInterval(()=>{
const now=new Date().getTime();
const distance=birthday-now;

if(distance<0){
document.querySelector(".container").innerHTML=
"<h1>Happy 21st Birthday Tiisetso 💖🎉</h1><p>You are my forever.</p>";
launchConfetti();
return;
}

document.getElementById("days").innerText=Math.floor(distance/(1000*60*60*24));
document.getElementById("hours").innerText=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
document.getElementById("minutes").innerText=Math.floor((distance%(1000*60*60))/(1000*60));
document.getElementById("seconds").innerText=Math.floor((distance%(1000*60))/1000);
},1000);

const messages=[
"You are my answered prayer 💕",
"Watching you grow is my blessing 🌸",
"21 looks perfect on you 😍",
"I choose you every day 💍",
"My forever starts with you 💖"
];

let index=0;
function nextMessage(){
index=(index+1)%messages.length;
document.getElementById("loveMessage").innerText=messages[index];
}

function openProposal(){
document.getElementById("proposal").classList.add("active");
}

function sayYes(){
alert("You just made me the happiest man alive 💖");
launchConfetti();
}

document.getElementById("noBtn").addEventListener("mouseover",function(){
this.style.position="absolute";
this.style.left=Math.random()*200+"px";
this.style.top=Math.random()*200+"px";
});

function launchConfetti(){
for(let i=0;i<100;i++){
let c=document.createElement("div");
c.classList.add("confetti");
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,70%)`;
document.body.appendChild(c);
setTimeout(()=>{c.remove();},3000);
}
}

for(let i=0;i<21;i++){
let balloon=document.createElement("div");
balloon.classList.add("balloon");
balloon.innerHTML="🎈";
balloon.style.left=Math.random()*100+"vw";
balloon.style.animationDuration=Math.random()*5+5+"s";
document.body.appendChild(balloon);
}

function toggleMusic(){
const music=document.getElementById("bgMusic");
if(music.paused){music.play();}
else{music.pause();}
}
</script>

</body>
</html>
