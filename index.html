<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Easter Egg 💖</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#ff8fb1,#ffc2d1,#ffe5ec);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
color:#fff;
overflow:hidden;
}

.container{

background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:30px;
border-radius:25px;
width:90%;
max-width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);

}

h1{
font-size:28px;
margin-bottom:10px;
}

p{
font-size:16px;
opacity:0.9;
}

button{

border:none;
padding:14px 25px;
border-radius:25px;
font-size:16px;
margin:10px;
cursor:pointer;

}

.yes{
background:#ff2e8a;
color:white;
}

.no{
background:#ff6f91;
color:white;
position:absolute;
}

#result{
display:none;
margin-top:20px;
}

.egg{

font-size:70px;
cursor:pointer;
margin-top:10px;

}

#photo{

display:none;
width:200px;
border-radius:20px;
margin-top:15px;

}

.heart{

position:fixed;
font-size:18px;
animation:float 6s linear infinite;

}

@keyframes float{

0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}

}

</style>

</head>

<body>

<div class="container">

<h1>Will You Be My Easter Egg? 🥚💖</h1>

<p>
Out of all the eggs in the world…  
I found the sweetest one 😌
</p>

<button class="yes" onclick="yesClicked()">YES ❤️</button>
<button class="no" id="noBtn" onclick="moveNo()">NO 😒</button>

<div id="result">

<h2>You chose YES 🥺💗</h2>

<p>
You just unlocked:  
<br>💋 Unlimited kisses  
<br>🤗 Lifetime cuddles  
<br>😂 Annoying boyfriend forever
</p>

<p>Tap the Easter egg 👇</p>

<div class="egg" onclick="openEgg()">🥚</div>

<img id="photo" src="herphoto.jpg">

<p id="message"></p>

</div>

</div>

<script>

function yesClicked(){

document.getElementById("result").style.display="block";

createHearts();

}

function moveNo(){

let btn=document.getElementById("noBtn");

btn.style.left=Math.random()*80+"vw";
btn.style.top=Math.random()*80+"vh";

}

function openEgg(){

document.getElementById("photo").style.display="block";

document.getElementById("message").innerHTML=
"You are the most beautiful girl in the world 😌💖";

}

function createHearts(){

for(let i=0;i<25;i++){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

}

}

</script>

</body>
</html>
