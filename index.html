<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyPinkHeart Turns 21 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
text-align:center;
color:white;
background:url("https://images.unsplash.com/photo-1502780402662-acc01917a918") no-repeat center center/cover;
padding:20px 0;
overflow-x:hidden;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg, rgba(255,105,180,0.85), rgba(255,20,147,0.85));
z-index:0;
}

.container{
position:relative;
z-index:1;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:25px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
max-width:600px;
width:95%;
margin-top:40px;
}

h1{
font-family:'Great Vibes',cursive;
font-size:38px;
}

h2{
font-weight:300;
margin-bottom:20px;
font-size:18px;
}

.countdown{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

.time-box{
flex:1 1 70px;
background:rgba(255,255,255,0.25);
padding:12px;
border-radius:15px;
}

.time-box span{
display:block;
font-size:24px;
font-weight:bold;
}

.message{
margin-top:20px;
font-size:14px;
line-height:1.6;
min-height:80px;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:25px;
background:#ff69b4;
color:white;
cursor:pointer;
font-weight:bold;
width:100%;
transition:0.3s;
}

button:hover{
background:#ff1493;
}

.photo{
margin-top:20px;
width:100%;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
color:#ff1493;
padding:25px;
border-radius:20px;
width:90%;
max-width:400px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
transition:0.4s ease;
z-index:10;
max-height:80vh;
overflow-y:auto;
}

.popup.active{
transform:translate(-50%,-50%) scale(1);
}

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 6s infinite ease-in;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

.firework{
position:absolute;
width:5px;
height:5px;
background:white;
border-radius:50%;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
to{
transform:translate(var(--x), var(--y));
opacity:0;
}
}

.cursor{
display:inline-block;
width:2px;
background:#ff1493;
animation:blink 1s infinite;
margin-left:3px;
}

@keyframes blink{
0%,50%,100%{opacity:1;}
25%,75%{opacity:0;}
}

@media(max-width:400px){
h1{font-size:30px;}
.time-box span{font-size:20px;}
}
</style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
<h1>MyPinkHeart 💖</h1>
<h2>Countdown to Your 21st Birthday 🎂</h2>

<div class="countdown">
<div class="time-box"><span id="days">0</span><small>Days</small></div>
<div class="time-box"><span id="hours">0</span><small>Hours</small></div>
<div class="time-box"><span id="minutes">0</span><small>Minutes</small></div>
<div class="time-box"><span id="seconds">0</span><small>Seconds</small></div>
</div>

<div class="message" id="countdownMessage"></div>

<img src="ourphoto.jpg" class="photo" alt="Our Love">

<button onclick="openLetter()">Open 6-Day Countdown Letter 💌</button>
<button onclick="showExcitement()">I Can’t Wait! 😍💖</button>
</div>

<div class="popup" id="letter">
<h3 style="font-family:'Great Vibes',cursive;font-size:26px;">Counting Down the Magic ✨</h3>
<p id="typingText" style="margin-top:10px; line-height:1.7;"></p>
<span class="cursor"></span>
<button onclick="closeLetter()">Close 💕</button>
</div>

<script>
// Birthday countdown date
const birthday=new Date("March 6, 2026 00:00:00").getTime();

// Update countdown every second
setInterval(()=>{
const now=new Date().getTime();
const distance=birthday-now;

if(distance<0){
document.querySelector(".container").innerHTML=
"<h1>Happy 21st Birthday Tiisetso Desiree Mnisi 💖🎉</h1><p>The big day is here! You’re unstoppable, glowing, and my favorite human ever. 💕✨</p>";
launchFireworks();
return;
}

document.getElementById("days").innerText=Math.floor(distance/(1000*60*60*24));
document.getElementById("hours").innerText=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
document.getElementById("minutes").innerText=Math.floor((distance%(1000*60*60))/(1000*60));
document.getElementById("seconds").innerText=Math.floor((distance%(1000*60))/1000);
},1000);

// Floating hearts
function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*20+10+"px";
heart.style.animationDuration=Math.random()*3+3+"s";
document.body.appendChild(heart);
setTimeout(()=>{heart.remove();},6000);
}
setInterval(createHeart,800);

// Open/Close letter popup
function openLetter(){
document.getElementById("letter").classList.add("active");
startTypingLetter();
}

function closeLetter(){
document.getElementById("letter").classList.remove("active");
document.getElementById("typingText").innerHTML="";
}

// Excitement button alert
function showExcitement(){
alert("Only 6 days to go!! 🎉💖 I’m already imagining your smile, your laugh, your glow… Tiisetso, you’re my favorite part of every day! 😍✨");
}

// Typing effect for 6-day countdown message
const countdownMsg = `Just 6 more days until my favorite human turns 21 🎉💖!
I can’t wait to shower you with hugs, kisses, and way too much cake 😏🍰
Tiisetso, get ready… the countdown to the cutest, most magical celebration of the year has begun! 💕✨
P.S. I might start dancing with excitement any second now 💃😂`;

let j = 0;
function typeCountdown() {
  const el = document.getElementById("countdownMessage");
  el.innerHTML = "";
  j = 0;
  function typeLetter(){
    if(j < countdownMsg.length){
      el.innerHTML += countdownMsg.charAt(j);
      j++;
      setTimeout(typeLetter, 35);
    }
  }
  typeLetter();
}
typeCountdown(); // Start on page load

// Typing effect for letter popup
const letterMsg = `Tiisetso Desiree Mnisi 💖

Just 6 days away from your 21st… the excitement is real!

I can’t wait to see your smile, hear your laugh, and celebrate YOU.
Every day with you feels like magic ✨
Get ready for hugs, kisses, and endless surprises 💕
I’m counting down every second until your special day!`;

let i = 0;
function startTypingLetter(){
const typingElement = document.getElementById("typingText");
typingElement.innerHTML="";
i = 0;
function type(){
if(i < letterMsg.length){
typingElement.innerHTML += letterMsg.charAt(i);
i++;
setTimeout(type, 35);
}
}
type();
}

// Fireworks on birthday
function launchFireworks(){
for(let i=0;i<100;i++){
let fw=document.createElement("div");
fw.classList.add("firework");
fw.style.left="50%";
fw.style.top="50%";
fw.style.setProperty('--x',(Math.random()-0.5)*500+"px");
fw.style.setProperty('--y',(Math.random()-0.5)*500+"px");
document.body.appendChild(fw);
setTimeout(()=>{fw.remove();},1000);
}
}
</script>

</body>
</html>
