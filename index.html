<!DOCTYPE html>
<html>
<head>
<title>MyPinkHeart 💕</title>
<style>
body{
  margin:0;
  padding:0;
  font-family: 'Segoe UI', cursive;
  background: linear-gradient(to right, #ffb6c1, #ff69b4);
  color:white;
  text-align:center;
  overflow-x:hidden;
}

h1{
  margin-top:30px;
  font-size:40px;
}

.countdown{
  font-size:28px;
  margin:20px 0;
}

.message{
  width:80%;
  margin:auto;
  font-size:20px;
  line-height:1.6;
  min-height:120px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff1493;
  font-weight:bold;
  margin:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#ff1493;
  color:white;
}

img{
  width:250px;
  border-radius:20px;
  margin-top:20px;
  box-shadow:0 0 20px rgba(255,255,255,0.7);
}

.heart{
  position:fixed;
  top:-10px;
  font-size:20px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{
    transform:translateY(100vh);
  }
}

.categories{
  margin-top:20px;
}
</style>
</head>
<body>

<h1>Tiisetso’s 21st Countdown 💕</h1>

<img src="ourphoto.jpg" alt="Our Photo">

<div class="countdown" id="countdown"></div>

<div class="message" id="mainMessage"></div>

<button onclick="openLetter()">Open My Heart 💌</button>

<div class="categories">
  <p>Choose ONE category to answer 😏👇</p>
  <button onclick="showQuestion('romantic')">Romantic 💖</button>
  <button onclick="showQuestion('birthday')">Birthday 🎂</button>
  <button onclick="showQuestion('funny')">Funny 😂</button>
  <button onclick="showQuestion('naughty')">Naughty 😈</button>
  <button onclick="showQuestion('didyouknow')">Did You Know? 🤔</button>
</div>

<script>
// Countdown to 6 March 2026
const birthday = new Date("March 6, 2026 00:00:00").getTime();

setInterval(function(){
  const now = new Date().getTime();
  const gap = birthday - now;

  const days = Math.floor(gap / (1000 * 60 * 60 * 24));
  const hours = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

  document.getElementById("countdown").innerHTML =
  "Only " + days + " days and " + hours + " hours left until you turn 21 🎉💖";
},1000);

// Typing effect main message
const mainText = `3 DAYS TO GO 😍💖

My beautiful Tiisetso Desiree Mnisi...

In just 3 days, the world celebrates 21 years of the most breathtaking, kind, sweet, and unforgettable woman.  

Even though we are miles apart right now, my heart feels closer to you than ever.  
Every second that passes is one second closer to your 21st… and one second closer to more memories with you.  

Your birthday isn’t just a day… it’s a reminder that heaven really did send me someone special. 💕✨`;

let i = 0;
function typeMain(){
  if(i < mainText.length){
    document.getElementById("mainMessage").innerHTML += mainText.charAt(i);
    i++;
    setTimeout(typeMain, 35);
  }
}
typeMain();

// Romantic Letter
function openLetter(){
  alert(`My Love 💌

Three days… just three days until you turn 21.

I wish I could hold your face in my hands at midnight and whisper how proud I am of the woman you’re becoming.

You are soft yet strong.  
Sweet yet powerful.  
Calm yet unforgettable.

Your smile alone could fix my worst day.  
Your voice alone can calm my storm.  

Being in love with you feels like winning every single day.

Happy almost 21st to the woman who owns my heart completely. 💖`);
}

// Category Questions
function showQuestion(type){
  let question = "";

  if(type === "romantic"){
    question = "Romantic 💖: What is the one moment with me that makes your heart feel the safest?";
  }

  if(type === "birthday"){
    question = "Birthday 🎂: On your 21st, what’s the one wish you secretly hope comes true?";
  }

  if(type === "funny"){
    question = "Funny 😂: If I tried to bake your 21st birthday cake, would you eat it… or call the fire department?";
  }

  if(type === "naughty"){
    question = "Naughty 😈: If we had one night with no rules and no interruptions… what’s the very first thing you’d do to me?";
  }

  if(type === "didyouknow"){
    question = "Did You Know? 🤔: Did you know that your name lights up my phone… but it also lights up my entire mood instantly?";
  }

  alert(question);
}

// Floating hearts
setInterval(function(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random()*3+2) + "s";
  document.body.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },5000);
},300);
</script>

</body>
</html>
