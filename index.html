<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin The Birthday Fate 🎂🎲</title>

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
               url("ourphoto.jpg");
    background-size:cover;
    background-position:center;
    color:white;
    text-align:center;
    padding:20px;
}

h1{
    font-size:24px;
    margin-top:10px;
}

.countdown{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin:20px 0;
}

.time-box{
    background:rgba(255,255,255,0.15);
    padding:12px;
    border-radius:15px;
    min-width:70px;
    border:2px solid white;
}

.time-box span{
    font-size:22px;
    font-weight:bold;
    display:block;
}

.section{
    background:rgba(255,255,255,0.15);
    padding:15px;
    border-radius:15px;
    margin:15px auto;
    width:95%;
    max-width:600px;
    text-align:left;
}

.spin-btn{
    margin:8px;
    padding:12px 20px;
    font-size:15px;
    border:none;
    border-radius:25px;
    background:white;
    color:#ff4fa3;
    cursor:pointer;
    font-weight:bold;
}

.spin-btn:hover{
    transform:scale(1.05);
}

#result,#summary{
    margin-top:15px;
    font-size:15px;
    color:#ff69b4;
    white-space:pre-wrap;
    text-align:left;
}
</style>
</head>
<body>

<h1>🎂 1 Day and Hours Until 21 My Princess 👑</h1>

<div class="countdown">
    <div class="time-box"><span id="days"></span>DAYS</div>
    <div class="time-box"><span id="hours"></span>HOURS</div>
    <div class="time-box"><span id="minutes"></span>MINUTES</div>
    <div class="time-box"><span id="seconds"></span>SECONDS</div>
</div>

<div class="section">
<h2>💌 A Note For You</h2>
<p id="loveLetter"></p>
</div>

<div class="section">
<h2>🎲 Spin Your Birthday Fate</h2>
<div id="spinButtons"></div>
<div id="result"></div>
<div id="summary"></div>
</div>

<script>

// Countdown
const birthday = new Date("March 6, 2026 00:00:00").getTime();

setInterval(function(){
    const now = new Date().getTime();
    const distance = birthday - now;

    document.getElementById("days").innerHTML =
        Math.floor(distance / (1000 * 60 * 60 * 24));
    document.getElementById("hours").innerHTML =
        Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    document.getElementById("minutes").innerHTML =
        Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    document.getElementById("seconds").innerHTML =
        Math.floor((distance % (1000 * 60)) / 1000);
},1000);


// Love Letter Typing Effect
const letterText = 
"My birthday Sweetheart 👑❤️\n\nTomorrow you turn 21… and I swear the world is not ready for this version of you.\n\nYou are beauty, softness, fire, and magic all in one body. Watching you grow, glow, and evolve is one of my favorite things in this life.\n\nThis year isn’t just another birthday — it’s your powerful era. Your confident era. Your unstoppable era.\n\nEvery spin you make below? I’m the one doing it for you.\n\nBecause this day belongs to you. Always.\n\nNow spin your fate, my love 🎲🔥";

let i = 0;
function typeLetter(){
    if(i < letterText.length){
        document.getElementById("loveLetter").innerHTML += letterText.charAt(i);
        i++;
        setTimeout(typeLetter,25);
    }
}
typeLetter();


// Categories (No Naughty)
const categories = {

Romantic:[
"Handwrite 21 love notes for you 💌",
"Write you a poem about our love ✍️",
"Buy you your favorite flowers when we go on a date🌹",
"Write 10 things I love about you ❤️",
"Send you a heartfelt email 💌",
"Recreate a romantic movie scene together 🎬"
],

Funny:[
"Recreate any couple TikTok video with you 🎥",
"Say 'Yes' to anything you ask for 21 hours 😌",
"Recreate a meme with you 🖼️",
"Let you choose my nickname for 21 hours 🤭",
"Do a silly face photo challenge with you 🤪"
],

Adventurous:[
"Plan something new for us to try together",
"We go somewhere new to explore",
"Choose a couple challenge trend for us to try",
"Decide one fearless thing we’ll both do this year",
"We plan game drive or quad biking adventure"
],

Physical:[
"Give you a 21-second tight hug 🤗",
"Give you 21 forehead kisses 😚",
"Give you a 21-minute massage 💆",
"Play a pillow fight with you 😌",
"Hold your hands for an entire day in public ✨"
]

};


// Spin Logic
const selectedOutcomes = {};
const spinButtonsDiv = document.getElementById("spinButtons");

for(const cat in categories){
    const btn = document.createElement("button");
    btn.className="spin-btn";
    btn.innerText=`Spin ${cat}`;
    btn.onclick=()=>spinCategory(cat,btn);
    spinButtonsDiv.appendChild(btn);
}

function spinCategory(category,btn){

    btn.disabled=true;
    btn.style.display="none";

    const arr=categories[category];
    const resultDiv=document.getElementById("result");

    let steps=50; // 10 seconds
    let current=0;

    const spinInterval=setInterval(()=>{
        const temp=arr[Math.floor(Math.random()*arr.length)];
        resultDiv.innerText=`${category}: ${temp} 🎡`;
        current++;

        if(current>=steps){
            clearInterval(spinInterval);

            const finalChoice=arr[Math.floor(Math.random()*arr.length)];
            resultDiv.innerText=`${category}: ${finalChoice} ✅`;
            selectedOutcomes[category]=finalChoice;

            if(Object.keys(selectedOutcomes).length===Object.keys(categories).length){

                let summary="🎉 YOUR BIRTHDAY FATE 🎉\n\n";

                for(const cat in selectedOutcomes){
                    summary+=`${cat}: ${selectedOutcomes[cat]}\n\n`;
                }

                summary+="\nI officially owe you all of this 😌❤️";

                document.getElementById("summary").innerText=summary;
            }
        }

    },200);
}

</script>
</body>
</html>
